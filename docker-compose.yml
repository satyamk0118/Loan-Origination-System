version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: los_postgres
    environment:
      POSTGRES_USER: los_user
      POSTGRES_PASSWORD: los_password
      POSTGRES_DB: los_db
    ports:
      - "5432:5432"
    volumes:
      - los_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U los_user -d los_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: los_app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/los_db
      SPRING_DATASOURCE_USERNAME: los_user
      SPRING_DATASOURCE_PASSWORD: los_password
    restart: on-failure

volumes:
  los_pgdata:
