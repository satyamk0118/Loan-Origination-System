spring.application.name=loan-origination-system

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/los_db
spring.datasource.username=los_user
spring.datasource.password=los_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Server
server.port=8080

# Thread Pool for Loan Processing
loan.processing.thread-pool-size=5
loan.processing.delay-min-seconds=15
loan.processing.delay-max-seconds=25
loan.processing.scheduler-interval-ms=10000

# Logging
logging.level.com.turno.los=DEBUG
logging.level.org.springframework.scheduling=INFO
